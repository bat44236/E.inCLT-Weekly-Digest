name: Weekly Digest

on:
  schedule:
    - cron: '0 12 * * 1'   # Every Monday at 8:00 AM ET (12:00 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub Actions tab

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            openai \
            google-api-python-client \
            google-auth-oauthlib \
            google-auth-httplib2 \
            python-dateutil

      - name: Decode Google token
        env:
          GCAL_TOKEN_B64: ${{ secrets.GCAL_TOKEN_B64 }}
        run: |
          echo "$GCAL_TOKEN_B64" | base64 --decode > token.json

      - name: Generate header image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_header.py

      - name: Build weekly digest HTML
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python digest_builder.py

      - name: Send digest email
        env:
          SMTP_SERVER:    ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:      ${{ secrets.SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python send_digest.py

      - name: Upload digest as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest
          path: weekly_events.html
          retention-days: 30
